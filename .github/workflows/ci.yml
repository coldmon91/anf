name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # macos-26 = the dev/release environment; macos-15 proves the lowered
    # macOS 14 deployment target actually RUNS on Sequoia, not just compiles.
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-26, macos-15]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Unit tests
        run: swift run anfTests

      - name: L10n template in sync
        run: python3 tools/gen-l10n.py --check
